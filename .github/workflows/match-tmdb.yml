name: TMDB Match Batch

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: '每批处理数量'
        required: false
        default: '500'
        type: string
  schedule:
    - cron: '0/30 * * * *'

jobs:
  match:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: node scripts/match-tmdb.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY_1: ${{ secrets.TMDB_API_KEY_1 }}
          TMDB_API_KEY_2: ${{ secrets.TMDB_API_KEY_2 }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '500' }}
