name: TMDB Match Batch

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      batch_size:
        description: '藩蠶揭燴杅講'
        required: false
        default: '3000'
        type: string
  schedule:
    - cron: '*/12 * * * *'

jobs:
  match:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run TMDB Match
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY_1: ${{ secrets.TMDB_API_KEY_1 }}
          TMDB_API_KEY_2: ${{ secrets.TMDB_API_KEY_2 }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '3000' }}
        run: node scripts/match-tmdb.mjs
