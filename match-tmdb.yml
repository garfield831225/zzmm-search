name: TMDB Match Batch

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: '每批处理数量'
        required: false
        default: '500'
        type: string
      dry_run:
        description: 'Dry run (只测试不写入)'
        required: false
        default: 'false'
        type: string
  schedule:
    # 每30分钟跑一次，直到全部匹配完
    - cron: '0/30 * * * *'

jobs:
  match:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run match batch
        run: node scripts/match-tmdb.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY_1: ${{ secrets.TMDB_API_KEY_1 }}
          TMDB_API_KEY_2: ${{ secrets.TMDB_API_KEY_2 }}
          MATCH_API_KEY: ${{ secrets.MATCH_API_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '500' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Report status
        if: always()
        run: |
          echo "=== Match batch finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="